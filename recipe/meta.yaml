{% set name = "hussh" %}
{% set version = "0.1.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hussh-{{ version }}.tar.gz
  sha256: 1aa73a1dc776a4a7095a7d6050fe49f7f6c7b120e2d062f6477a56d12992628e

build:
  skip: true  # [py<38]
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - make
    - perl  # [win]
  host:
    - python
    - maturin >=1.5,<2.0
    - pip
  run:
    - python

test:
  imports:
    - hussh
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/JacobCallahan/Hussh
  summary: Client-side ssh library that offers low level performance through a high level interface
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
